<!DOCTYPE html>

    <title>forms</title>
</head>
<body>
    <label for="chose an option">chose an option
    <input type="text" id="chose an option">
    <select name="number" id="d1"></select>
    <option value="1">1</option>
    <option value="2">2</option>
    <option value="3">3</option>

    </select>
